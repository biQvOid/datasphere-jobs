name: ranking_candidates
desc: ranking candidates from all sources
cmd: python main.py --scoring_dt=${SCORING_DT} --segment_ids=${SEGMENT_IDS} --scoring_type=${SCORING_TYPE}

args:
  SCORING_DT: "2023-05-15"
  SEGMENT_IDS: 1
  SCORING_TYPE: "NRT"
env:
  python:
    type: manual
    version: 3.10
    requirements-file: requirements.txt
    local-paths:
      - main.py
      - utils.py
      - ../.env
flags:
  - attach-project-disk
cloud-instance-type: c1.32