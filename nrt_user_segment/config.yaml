name: nrt-segment
desc: calculating nrt-segment
cmd: python main.py --scoring_dt=${SCORING_DT} --segment_ids=${SEGMENT_IDS} --scoring_timedelta=${SCORING_TIMEDELTA}

args:
  SCORING_DT: "2023-05-15_14:30:00"
  SEGMENT_IDS: 100
  SCORING_TIMEDELTA: 30
env:
  python:
    type: manual
    version: 3.10
    requirements-file: requirements.txt
    local-paths:
      - main.py
flags:
  - attach-project-disk
cloud-instance-type: c1.4